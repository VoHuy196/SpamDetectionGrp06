name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run Tests
        run: |
          cd api
          pytest test_app.py

      - name: Build Docker Images
        run: |
          docker-compose build